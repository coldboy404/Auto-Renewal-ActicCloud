name: ArcticCloud Auto Renewal

on:
  schedule:
    - cron: '56 10 */4 * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: 检查 PAT 配置
      run: |
        if [ -z "${{ secrets.PAT }}" ]; then
          echo "❌ 错误: PAT 未配置"
          echo "请在 Settings → Secrets and variables → Actions 中添加 PAT"
          exit 1
        else
          echo "✅ PAT 已配置"
        fi
    
    - name: 运行续期脚本
      env:
        CONFIG: ${{ secrets.CONFIG }}
      run: python AutoRenewal.py
    
    - name: 提交 workflow 更新
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .github/workflows/auto-renewal.yml
        git diff --staged --quiet || git commit -m "🤖 自动更新运行计划 [skip ci]"
        git push
    

    
    - name: 上传日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: renewal-log
        path: |
          *.log
        retention-days: 30
